<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeuroMed AI Doctor</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:420px;
height:700px;
background:white;
border-radius:14px;
display:flex;
flex-direction:column;
box-shadow:0 25px 60px rgba(0,0,0,.4);
overflow:hidden;
}

header{
background:#1f6feb;
color:white;
text-align:center;
padding:15px;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
background:#f4f6f9;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{
background:#1f6feb;
color:white;
margin-left:auto;
}

.bot{
background:white;
border:1px solid #ddd;
}

.input{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
border:none;
padding:12px;
font-size:14px;
}

button{
background:#1f6feb;
color:white;
border:none;
padding:12px 16px;
cursor:pointer;
}

.suggest{
padding:10px;
background:#eef3ff;
font-size:12px;
}

.suggest span{
background:#1f6feb;
color:white;
padding:5px 8px;
margin:3px;
display:inline-block;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

/* ---------------------
MEDICAL DATASET
--------------------- */

const medicalQA=[

{q:"diabetes",a:"Diabetes is a chronic disease that causes high blood sugar."},

{q:"covid",a:"COVID-19 is a viral respiratory disease caused by SARS-CoV-2."},

{q:"asthma",a:"Asthma is a condition where airways become inflamed and narrow."},

{q:"flu",a:"Flu is a contagious respiratory illness caused by influenza viruses."},

{q:"headache",a:"Headaches are often caused by stress, dehydration, or fatigue."}

]


/* ---------------------
DISEASE PREDICTION
--------------------- */

const diseases={

covid:["fever","cough","fatigue"],

flu:["fever","chills","body"],

asthma:["cough","breathing","wheezing"],

diabetes:["thirst","urination","fatigue"]

}


/* ---------------------
AI ENGINE
--------------------- */

function medicalAI(text){

text=text.toLowerCase()

let answer="⚠ Please consult a healthcare professional."

medicalQA.forEach(item=>{
if(text.includes(item.q)){
answer=item.a
}
})

let prediction=""

let words=text.split(" ")

for(let d in diseases){

let score=0

diseases[d].forEach(s=>{
if(words.includes(s)) score++
})

if(score>0){

prediction+=
d+" probability: "+(score*30)+"% | "

}

}

return answer+" "+prediction

}


/* ---------------------
REACT COMPONENT
--------------------- */

function App(){

const [messages,setMessages]=React.useState([])

const [input,setInput]=React.useState("")


const send=()=>{

if(!input) return

const userMsg={
text:input,
type:"user"
}

setMessages(m=>[...m,userMsg])

setTimeout(()=>{

const res=medicalAI(input)

setMessages(m=>[
...m,
{ text:res,type:"bot"}
])

},600)

setInput("")

}


const ask=(q)=>{

setInput(q)

}


return(

<div className="app">

<header>

<h2>🧠 NeuroMed AI</h2>
<p>Digital Medical Assistant</p>

</header>

<div className="chat">

{messages.map((m,i)=>(

<div
key={i}
className={
"msg "+m.type
}
>

{m.text}

</div>

))}

</div>

<div className="suggest">

<span onClick={()=>ask("covid symptoms")}>COVID</span>

<span onClick={()=>ask("diabetes symptoms")}>Diabetes</span>

<span onClick={()=>ask("asthma breathing problem")}>Asthma</span>

<span onClick={()=>ask("headache cause")}>Headache</span>

</div>

<div className="input">

<input
value={input}
onChange={e=>setInput(e.target.value)}
placeholder="Describe symptoms..."
/>

<button onClick={send}>
Ask
</button>

</div>

</div>

)

}


ReactDOM.createRoot(
document.getElementById("root")
).render(<App/>)

</script>

</body>
</html>
